<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Panel — Interview Scheduler</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: #f0f4f8; padding: 40px 20px; }
    h1 { font-size: 1.6rem; color: #1a202c; margin-bottom: 4px; }
    .sub { color: #718096; margin-bottom: 32px; font-size: 0.95rem; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; max-width: 960px; margin: 0 auto; }
    @media(max-width:640px) { .grid { grid-template-columns: 1fr; } }
    .card { background: #fff; border-radius: 12px; padding: 28px; box-shadow: 0 2px 12px rgba(0,0,0,0.07); }
    h2 { font-size: 1.1rem; color: #2d3748; margin-bottom: 20px; }
    input { width: 100%; padding: 10px 14px; border: 1px solid #e2e8f0; border-radius: 6px; font-size: 0.95rem; margin-bottom: 12px; }
    input:focus { outline: none; border-color: #4299e1; box-shadow: 0 0 0 2px #bee3f8; }
    button.primary { width: 100%; padding: 11px; background: #4299e1; color: #fff; border: none; border-radius: 6px; font-weight: 600; cursor: pointer; font-size: 0.95rem; }
    button.primary:hover { background: #3182ce; }
    .msg { margin-top: 12px; padding: 10px; border-radius: 6px; font-size: 0.88rem; display: none; }
    .msg.success { background: #c6f6d5; color: #276749; }
    .msg.error { background: #fed7d7; color: #9b2335; }
    .list { margin-top: 8px; }
    .interviewer-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 14px; background: #f7fafc; border-radius: 6px; margin-bottom: 8px; }
    .interviewer-item .info { font-size: 0.9rem; }
    .interviewer-item .name { font-weight: 600; color: #2d3748; }
    .interviewer-item .email { color: #718096; font-size: 0.82rem; }
    button.remove { background: #fc8181; color: #fff; border: none; border-radius: 4px; padding: 5px 10px; cursor: pointer; font-size: 0.8rem; }
    button.remove:hover { background: #e53e3e; }
    .empty { color: #a0aec0; font-size: 0.9rem; text-align: center; padding: 20px; }
    .header { max-width: 960px; margin: 0 auto 24px; }
    .back { color: #4299e1; font-size: 0.88rem; text-decoration: none; }
  </style>
</head>
<body>
  <div class="header">
    <a class="back" href="/">← Back to Upload</a>
    <h1 style="margin-top:8px">⚙️ Admin Panel</h1>
    <p class="sub">Manage interviewers and view applications.</p>
  </div>
  <div class="grid">
    <div class="card">
      <h2>➕ Add Interviewer</h2>
      <form id="add-form">
        <input type="text" id="name" placeholder="Full Name" required />
        <input type="email" id="email" placeholder="Email Address" required />
        <button type="submit" class="primary">Add Interviewer</button>
      </form>
      <div class="msg" id="add-msg"></div>
    </div>
    <div class="card">
      <h2>👥 Interviewers</h2>
      <div class="list" id="interviewer-list"><div class="empty">Loading...</div></div>
    </div>
  </div>

  <script>
    async function loadInterviewers() {
      const list = document.getElementById('interviewer-list');
      try {
        const res = await fetch('/api/interviewers');
        const data = await res.json();
        if (!data.length) { list.innerHTML = '<div class="empty">No interviewers added yet.</div>'; return; }
        list.innerHTML = data.map(i => `
          <div class="interviewer-item">
            <div class="info">
              <div class="name">${i.name}</div>
              <div class="email">${i.email}</div>
            </div>
            <button class="remove" onclick="removeInterviewer('${i.id}')">Remove</button>
          </div>`).join('');
      } catch { list.innerHTML = '<div class="empty">Failed to load.</div>'; }
    }

    async function removeInterviewer(id) {
      if (!confirm('Remove this interviewer?')) return;
      await fetch('/api/interviewers/' + id, { method: 'DELETE' });
      loadInterviewers();
    }

    document.getElementById('add-form').addEventListener('submit', async e => {
      e.preventDefault();
      const msg = document.getElementById('add-msg');
      const name = document.getElementById('name').value.trim();
      const email = document.getElementById('email').value.trim();
      msg.style.display = 'none';
      try {
        const res = await fetch('/api/interviewers', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ name, email }) });
        const data = await res.json();
        msg.style.display = 'block';
        if (res.ok) { msg.className = 'msg success'; msg.textContent = '✅ Interviewer added!'; e.target.reset(); loadInterviewers(); }
        else { msg.className = 'msg error'; msg.textContent = '❌ ' + data.error; }
      } catch { msg.style.display = 'block'; msg.className = 'msg error'; msg.textContent = '❌ Server error.'; }
    });

    loadInterviewers();
  </script>
</body>
</html>
